name: Plugin CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  plugin-ci:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
    uses: mpiton/vortex/.github/workflows/plugin-ci.yml@3abf4058eb1fa946b196b1a87cf459c4ffe73a4e

  plugin-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') && github.actor == github.repository_owner }}
    permissions:
      contents: write
    uses: mpiton/vortex/.github/workflows/plugin-release.yml@f91b43d62504522407e2e491aaf9d53dacd2726b
